#  compose.yaml
services:
  postgres:
    image: postgres:15-alpine
    container_name: ${DB_CONTAINER_NAME}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    ports:
      - '${DATABASE_PORT}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - cambridge_net

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_container
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      TZ: ${TZ}
    ports:
      - '${PGADMIN_PORT}:80'
    depends_on:
      - postgres
    networks:
      - cambridge_net

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME}
    environment:
      TZ: ${TZ}
    networks:
      - cambridge_net
    ports:
      - '${REDIS_PORT}:6379'

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight_container
    ports:
      - '5540:5540'
    environment:
      TZ: ${TZ}
    depends_on:
      - redis
    networks:
      - cambridge_net

  auth-service:
    build:
      context: .
    container_name: ${AUTH_SERVICE_CONTAINER_NAME}
    ports:
      - '${AUTH_SERVICE_PORT}:${AUTH_SERVICE_PORT}'
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      LOG_LEVEL: ${LOG_LEVEL}
    depends_on:
      - redis
      - postgres
    networks:
      - cambridge_net

volumes:
  pgdata:

networks:
  cambridge_net:
    driver: bridge
