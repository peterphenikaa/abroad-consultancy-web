_format_version: "3.0"

# 1. Global plugins
plugins:
  - name: cors
    enabled: true
    config:
      origins: ["*"]
      methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
      headers: ["Authorization", "Content-Type", "Accept"]
      exposed_headers: ["Set-Cookie"]
      credentials: true
      max_age: 3600

  - name: response-transformer
    enabled: true
    config:
      add:
        headers:
          - "X-Content-Type-Options:nosniff"
          - "X-Frame-Options:DENY"
          - "X-XSS-Protection:0"
          - "Strict-Transport-Security:max-age=31536000; includeSubDomains"

  - name: ip-restriction
    enabled: true
    config:
      allow:
        - ["0.0.0.0/0"] # turn on for all IPs, adjust as needed for production

services:
  - name: mock-service
    url: http://localhost:8000
    routes:
      - name: health-check
        paths:
          - /health
