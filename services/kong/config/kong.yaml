upstreams:
  - name: auth-service-upstream
    algorithm: round-robin
    healthchecks:
      active:
        type: http
        http_path: /api/auth/health
        timeout: 1
        healthy:
          interval: 30
          successes: 1
        unhealthy:
          interval: 30
          http_failures: 3
          tcp_failures: 3
    targets:
      - target: cambridge-auth-service:3001
        weight: 100

  - name: content-service-upstream
    algorithm: round-robin
    healthchecks:
      active:
        type: tcp
        http_path: /
        timeout: 1
        healthy:
          interval: 30
          successes: 1
        unhealthy:
          interval: 30
          http_failures: 3
          tcp_failures: 3
    targets:
      - target: content-service:3000
        weight: 100

  - name: payment-service-upstream
    algorithm: round-robin
    healthchecks:
      active:
        type: http
        http_path: /api/payments/health
        timeout: 1
        healthy:
          interval: 30
          successes: 1
        unhealthy:
          interval: 30
          http_failures: 3
          tcp_failures: 3
    targets:
      - target: payment-service:3008
        weight: 100

# 3. Services and Routes
services:
  # Global Health Check Endpoint
  # Sử dụng plugin request-termination để trả về 200 OK ngay tại Gateway
  - name: gateway-health
    url: http://localhost:8000 # Dummy URL, plugin sẽ chặn trước khi gọi
    routes:
      - name: health-route
        paths:
          - /health
    plugins:
      - name: request-termination
        config:
          status_code: 200
          content_type: application/json; charset=utf-8
          body: '{"status": "OK", "service": "Kong Gateway", "message": "Gateway is routing traffic successfully."}'

  # Auth service
  - name: auth-service
    host: auth-service-upstream
    port: 8000
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: auth-route
        paths:
          - /api/auth
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          second: 10
          hour: 1000
          policy: redis
          redis_host: kong-redis
          redis_port: 6379

  # Content Service
  - name: content-service
    host: content-service-upstream
    port: 8000
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: content-routes
        paths:
          - /api/content
          - /api/v1
        strip_path: false

  # Payment Service
  - name: payment-service
    host: payment-service-upstream
    port: 8000
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: payment-routes
        paths:
          - /api/payments
        strip_path: false

  # User Service
  - name: user-service
    host: user-service
    port: 3002
    routes:
      - name: user-routes
        paths:
          - /api/users
        strip_path: false
    plugins:
      - name: jwt
        config:
          key_claim_name: iss
          anonymous: null
          claims_to_verify:
            - exp

  # Search Service (public read — trang /search không bắt buộc đăng nhập)
  - name: search-service
    host: search-service
    port: 3007
    routes:
      - name: search-routes
        paths:
          - /api/search
        strip_path: false

  # Swagger Docs
  - name: swagger-docs
    url: http://swagger-nginx:80
    routes:
      - name: swagger-ui
        paths:
          - /docs
        strip_path: false
      - name: swagger-spec
        paths:
          - /swagger.json
        strip_path: false

  # Mock Stub Services
  # Gom chung các dịch vụ chưa implement vào một rule để dễ quản lý
  - name: stub-services
    url: http://localhost:8000 # Dummy URL
    routes:
      - name: stub-routes
        paths:
          - /api/exams
          - /api/quizzes
          - /api/notifications
          - /api/analytics
          - /api/ai
    plugins:
      - name: request-termination
        config:
          status_code: 503
          content_type: application/json; charset=utf-8
          body: '{"success": false, "message": "Service not yet implemented. Please check back later."}'
