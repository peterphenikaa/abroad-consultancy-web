_format_version: "3.0"

plugins:
  - name: cors
    enabled: true
    config:
      origins: ["*"]
      methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
      headers: ["Authorization", "Content-Type", "Accept"]
      exposed_headers: ["Set-Cookie"]
      credentials: true
      max_age: 3600

services:
  - name: mock-service
    url: http://localhost:8000
    routes:
      - name: health-check
        paths:
          - /health
