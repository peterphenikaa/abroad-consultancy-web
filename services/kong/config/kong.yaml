_format_version: "3.0"

# 1. Global plugins
plugins:
  - name: cors
    enabled: true
    config:
      origins: ["*"]
      methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS", "PATCH"]
      headers: ["Authorization", "Content-Type", "Accept", "x-user-id"]
      exposed_headers: ["Set-Cookie"]
      credentials: true
      max_age: 3600

  # Cấu hình Global Rate Limiting (Sử dụng Redis)
  - name: rate-limiting
    enabled: true
    config:
      second: 5 # Giới hạn 5 request/giây
      hour: 1000 # Giới hạn 1000 request/giờ
      policy: redis # Bắt buộc dùng Redis
      redis_host: kong-redis
      redis_port: 6379

  - name: response-transformer
    enabled: true
    config:
      add:
        headers:
          - "X-Content-Type-Options:nosniff"
          - "X-Frame-Options:DENY"
          - "X-XSS-Protection:0"
          - "Strict-Transport-Security:max-age=31536000; includeSubDomains"

  - name: ip-restriction
    enabled: true
    config:
      allow:
        - "0.0.0.0/0" # turn on for all IPs, adjust as needed for production

  - name: request-size-limiting
    enabled: true
    config:
      allowed_payload_size: 10

  - name: prometheus
    enabled: true

  - name: file-log
    enabled: true
    config:
      path: /dev/stdout
      reopen: true

consumers:
  - username: cambridge-api
    jwt_secrets:
      - algorithm: RS256
        secret: "not-used-for-rs256"
        key: cambridge-api
        rsa_public_key: |
