# compose.yaml
services:
  kong:
    image: "${KONG_DOCKER_TAG:-kong:latest}"
    user: "${KONG_USER:-kong}"
    environment:
      # Kích hoạt chế độ DB-less
      KONG_DATABASE: "off"
      # Đường dẫn tới file khai báo cấu hình
      KONG_DECLARATIVE_CONFIG: "/opt/kong/kong.yaml"

      # Cấu hình listener
      KONG_PROXY_LISTEN: "${KONG_PROXY_LISTEN:-0.0.0.0:8000}"
      KONG_ADMIN_LISTEN: "${KONG_ADMIN_LISTEN:-0.0.0.0:8001}"

      # Log ra stdout/stderr để dễ dàng theo dõi bằng docker logs
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PREFIX: ${KONG_PREFIX:-/var/run/kong}

      # Plugins rate limiting to redis
      KONG_REDIS_HOST: kong-redis
    networks:
      - app-network
    ports:
      # Proxy traffic (HTTP/HTTPS)
      - "${KONG_INBOUND_PROXY_LISTEN:-0.0.0.0}:8081:8000/tcp"
      - "${KONG_INBOUND_SSL_PROXY_LISTEN:-0.0.0.0}:8443:8443/tcp"

      # Admin API (Khuyến nghị: chặn truy cập từ ngoài nếu không cần thiết)
      - "8001:8001/tcp"
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 5s
    restart: on-failure
    read_only: true
    volumes:
      # Dùng tmpfs để lưu file tạm (tăng hiệu năng và bảo mật)
      - kong_prefix_vol:${KONG_PREFIX:-/var/run/kong}
      - kong_tmp_vol:/tmp
      # Mount file cấu hình từ host vào container ở chế độ chỉ đọc (read-only)
      - ./config:/opt/kong:ro
    security_opt:
      - no-new-privileges
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    depends_on:
      - kong-redis

  kong-redis:
    image: redis:7-alpine
    container_name: cambridge-kong-redis
    ports:
      - "6380:6379"
    networks:
      - app-network

networks:
  app-network:
    external: true
    name: app-network

volumes:
  kong_prefix_vol:
    driver_opts:
      type: tmpfs
      device: tmpfs
  kong_tmp_vol:
    driver_opts:
      type: tmpfs
      device: tmpfs
