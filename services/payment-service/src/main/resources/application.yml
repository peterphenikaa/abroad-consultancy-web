spring:
  application:
    name: payment-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

logging:
  level:
    com.abroad.payment.service.VnPayCheckoutService: ${VNPAY_DEBUG_LOG:INFO}

server:
  port: ${SERVER_PORT:3008}

app:
  webhook:
    secret: ${PAYMENT_WEBHOOK_SECRET:dev-webhook-secret}
  payment:
    pending-ttl-minutes: ${PAYMENT_PENDING_TTL_MINUTES:15}
    pending-cleanup-enabled: ${PAYMENT_PENDING_CLEANUP_ENABLED:true}
    pending-cleanup-cron: ${PAYMENT_PENDING_CLEANUP_CRON:0 * * * * *}
  billing:
    auto-renew-enabled: ${BILLING_AUTO_RENEW_ENABLED:true}
    simulate-insufficient-funds: ${BILLING_SIMULATE_INSUFFICIENT_FUNDS:false}
    renewal-cron: ${BILLING_RENEWAL_CRON:0 0 * * * *}
  content-service:
    url: ${CONTENT_SERVICE_URL:http://content-service:3000}
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:}
    hash-secret: ${VNPAY_HASH_SECRET:}
    pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    return-url: ${VNPAY_RETURN_URL:}
    ipn-url: ${VNPAY_IPN_URL:}
    frontend-redirect-base: ${VNPAY_FRONTEND_URL:http://localhost:5173/payment}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:payments;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
