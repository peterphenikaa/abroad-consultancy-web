version: '3.8'

services:
  # Database Service (Note: User is using Supabase, so this is just Redis for BullMQ)
  redis:
    image: redis:7-alpine
    container_name: study-abroad-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: always

  # Backend Service (Express + Prisma + BullMQ)
  server:
    build: ./server
    container_name: study-abroad-server
    environment:
      - NODE_ENV=production
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL} # Provided via .env in root
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    depends_on:
      - redis
    ports:
      - '5000:5000'
    networks:
      - app-network
    restart: always

  # Frontend Service (React + Nginx)
  client:
    build: ./client
    container_name: study-abroad-client
    ports:
      - '80:80'
    depends_on:
      - server
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  redis_data:
