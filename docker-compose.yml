version: '3.8'

services:
  # ==========================================
  # 🗄️ INFRASTRUCTURE & DATABASES (LOCAL)
  # ==========================================
  # [S3 bằng MinIO]
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Web UI Port
    volumes:
      - minio_data:/data
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "29092:29092"
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    # Không publish port ra host — tránh xung đột 6379/6380; service trong compose dùng redis:6379
    networks:
      - app-network

  # SMTP giả lập cho auth-service (OTP / mail), UI: http://localhost:1080
  maildev:
    image: maildev/maildev:2.0.5
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - app-network

  # ==========================================
  # ⚙️ MICROSERVICES
  # ==========================================
  api-gateway:
    build: ./api-gateway
    env_file: .env
    environment:
      - PORT=8080
      - CONTENT_SERVICE_URL=http://content-service:3000
      - REDIS_URL=redis://redis:6379
      - JWT_PUBLIC_KEY=@dev-keys/jwt-public.pem
      - PAYMENT_TEST_USER_ID=${PAYMENT_TEST_USER_ID:-}
    volumes:
      - ./dev-keys:/app/dev-keys:ro
    ports:
      - "8081:8080"
    depends_on:
      - auth-service
      - user-service
      - content-service
      - payment-service
      - redis
    networks:
      - app-network

  auth-service:
    build: ./services/auth-service
    env_file: .env
    environment:
      - PORT=3001
      - KAFKA_BROKER=kafka:9092
      - REDIS_URL=redis://redis:6379
      - SMTP_HOST=maildev
      - SMTP_PORT=1025
      - SMTP_USER=dev
      - SMTP_PASS=dev
      - JWT_PUBLIC_KEY=@dev-keys/jwt-public.pem
      - JWT_PRIVATE_KEY=@dev-keys/jwt-private.pem
    volumes:
      - ./dev-keys:/usr/src/app/dev-keys:ro
    depends_on:
      - kafka
      - redis
      - maildev
    networks:
      - app-network

  user-service:
    build: ./services/user-service
    env_file: .env
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka
    networks:
      - app-network

  ai-rag-service:
    build: ./services/ai-rag-service
    env_file: .env
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka
    networks:
      - app-network

  content-service:
    build: ./services/content-service
    env_file: .env
    environment:
      - PORT=3000
      - KAFKA_BROKER=kafka:9092
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123
      - PAYMENT_WEBHOOK_SECRET=${PAYMENT_WEBHOOK_SECRET:-dev-webhook-secret}
    ports:
      - "3000:3000"
    depends_on:
      - kafka
      - minio
    networks:
      - app-network

  payment-service:
    build: ./services/payment-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "3008"
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-dev-webhook-secret}
      CONTENT_SERVICE_URL: http://content-service:3000
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-}
      VNPAY_PAY_URL: ${VNPAY_PAY_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-}
      VNPAY_FRONTEND_URL: ${VNPAY_FRONTEND_URL:-http://localhost:80/payment}
      VNPAY_DEBUG_LOG: ${VNPAY_DEBUG_LOG:-INFO}
      BILLING_AUTO_RENEW_ENABLED: ${BILLING_AUTO_RENEW_ENABLED:-true}
      BILLING_SIMULATE_INSUFFICIENT_FUNDS: ${BILLING_SIMULATE_INSUFFICIENT_FUNDS:-false}
      PAYMENT_PENDING_TTL_MINUTES: ${PAYMENT_PENDING_TTL_MINUTES:-15}
      PAYMENT_PENDING_CLEANUP_ENABLED: ${PAYMENT_PENDING_CLEANUP_ENABLED:-true}
    ports:
      - "3008:3008"
    depends_on:
      - content-service
    networks:
      - app-network

  # Các service khác (Bật lên khi code)
  # exam-service:
  #   build: ./services/exam-service
  #   env_file: .env
  # quiz-service:
  #   build: ./services/quiz-service
  #   env_file: .env
  # notification-service:
  #   build: ./services/notification-service
  #   env_file: .env
  # search-service:
  #   build: ./services/search-service
  #   env_file: .env
  # analytics-service:
  #   build: ./services/analytics-service
  #   env_file: .env

  # ==========================================
  # 💻 CLIENT
  # ==========================================
  client:
    build:
      context: ./client
    env_file: .env
    environment:
      # Trong container, localhost ≠ máy host — phải dùng tên service Docker
      - VITE_API_PROXY_TARGET=http://api-gateway:8080
    ports:
      - "81:80"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - api-gateway
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  minio_data:
