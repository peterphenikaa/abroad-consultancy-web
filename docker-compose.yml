services:
  # ==========================================
  # 🗄️ INFRASTRUCTURE & DATABASES (LOCAL)
  # ==========================================
  # [S3 bằng MinIO]
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Web UI Port
    volumes:
      - minio_data:/data
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "29092:29092"
    networks:
      - app-network

  # ==========================================
  # ⚙️ MICROSERVICES
  # ==========================================

  user-db:
    image: postgres:15-alpine
    container_name: cambridge_user_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user_db
    ports:
      - "5433:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - app-network

  user-service:
    build: ./services/user-service
    env_file: .env
    environment:
      - PORT=3002
      - DATABASE_URL=postgresql://user:password@user-db:5432/user_db
      - JWT_PUBLIC_KEY=@/app/keys/jwtRS256.key.pub
    volumes:
      - ./services/auth-service/keys:/app/keys:cached
    ports:
      - "3002:3002"
    depends_on:
      - user-db
    networks:
      - app-network

  ai-rag-service:
    build: ./services/ai-rag-service
    env_file: .env
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka
    networks:
      - app-network

  content-service:
    build: ./services/content-service
    env_file: .env
    environment:
      - PORT=3000
      - KAFKA_BROKER=kafka:9092
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123
      - JWT_PUBLIC_KEY=@/app/keys/jwtRS256.key.pub
      - PAYMENT_WEBHOOK_SECRET=${PAYMENT_WEBHOOK_SECRET:-dev-webhook-secret}
    volumes:
      - ./services/auth-service/keys:/app/keys:cached
      - ./services/shared:/app/node_modules/@cambridge/shared:ro
      - ./services/content-service/src:/app/src:cached
    ports:
      - "3000:3000"
    depends_on:
      - kafka
      - minio
    networks:
      - app-network

  payment-service:
    build: ./services/payment-service
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: "3008"
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-dev-webhook-secret}
      CONTENT_SERVICE_URL: http://content-service:3000
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE:-}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET:-}
      VNPAY_PAY_URL: ${VNPAY_PAY_URL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL:-}
      VNPAY_FRONTEND_URL: ${VNPAY_FRONTEND_URL:-http://localhost:80/payment}
      VNPAY_DEBUG_LOG: ${VNPAY_DEBUG_LOG:-INFO}
      BILLING_AUTO_RENEW_ENABLED: ${BILLING_AUTO_RENEW_ENABLED:-true}
      BILLING_SIMULATE_INSUFFICIENT_FUNDS: ${BILLING_SIMULATE_INSUFFICIENT_FUNDS:-false}
      PAYMENT_PENDING_TTL_MINUTES: ${PAYMENT_PENDING_TTL_MINUTES:-15}
      PAYMENT_PENDING_CLEANUP_ENABLED: ${PAYMENT_PENDING_CLEANUP_ENABLED:-true}
    ports:
      - "3008:3008"
    depends_on:
      - content-service
    networks:
      - app-network

  # Các service khác (Bật lên khi code)
  # exam-service:
  #   build: ./services/exam-service
  #   env_file: .env
  # quiz-service:
  #   build: ./services/quiz-service
  #   env_file: .env
  # notification-service:
  #   build: ./services/notification-service
  #   env_file: .env
  # search-service:
  #   build: ./services/search-service
  #   env_file: .env
  # analytics-service:
  #   build: ./services/analytics-service
  #   env_file: .env

  # ==========================================
  # 💻 CLIENT
  # ==========================================
  client:
    build:
      context: ./client
    env_file: .env
    environment:
      - VITE_API_PROXY_TARGET=http://cambridge-kong:8000
    ports:
      - "81:80"
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - app-network

networks:
  app-network:
    name: app-network
    external: true

volumes:
  minio_data:
  user_db_data:
