version: '3.8'

services:
  # Backend Service (Express + Prisma + BullMQ)
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: study-abroad-server
    # Load trực tiếp tất cả biến từ file .env vào trong container
    env_file:
      - .env 
    environment:
      - NODE_ENV=production
    # Mount source code for live-reload
    volumes:
      - ./server:/app
      - /app/node_modules # Do not override container node_modules
    ports:
      - '5000:5000'
    networks:
      - app-network
    restart: always

  # Frontend Service (React + Nginx)
  client:
    build: ./client
    container_name: study-abroad-client
    # Mount source code for HMR
    volumes:
      - ./client:/app
      - /app/node_modules # Do not override container node_modules
    ports:
      - '80:80'
    depends_on:
      - server
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge