version: "3.8"

services:
  # ==========================================
  # 🗄️ INFRASTRUCTURE & DATABASES (LOCAL)
  # ==========================================
  # [S3 bằng MinIO]
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Web UI Port
    volumes:
      - minio_data:/data
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "29092:29092"
    networks:
      - app-network

  # ==========================================
  # ⚙️ MICROSERVICES
  # ==========================================

  user-service:
    build: ./services/user-service
    env_file: .env
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka
    networks:
      - app-network

  ai-rag-service:
    build: ./services/ai-rag-service
    env_file: .env
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      - kafka
    networks:
      - app-network

  content-service:
    build: ./services/content-service
    env_file: .env
    environment:
      - PORT=3000
      - KAFKA_BROKER=kafka:9092
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password123
    volumes:
      - ./services/auth-service/keys:/app/keys:cached
      - ./services/shared:/app/node_modules/@cambridge/shared:ro
    ports:
      - "3000:3000"
    depends_on:
      - kafka
      - minio
    networks:
      - app-network

  # Các service khác (Bật lên khi code)
  # exam-service:
  #   build: ./services/exam-service
  #   env_file: .env
  # quiz-service:
  #   build: ./services/quiz-service
  #   env_file: .env
  # payment-service:
  #   build: ./services/payment-service
  #   env_file: .env
  # notification-service:
  #   build: ./services/notification-service
  #   env_file: .env
  # search-service:
  #   build: ./services/search-service
  #   env_file: .env
  # analytics-service:
  #   build: ./services/analytics-service
  #   env_file: .env

  # ==========================================
  # 💻 CLIENT
  # ==========================================
  client:
    build:
      context: ./client
    env_file: .env
    ports:
      - "81:80"
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - app-network

networks:
  app-network:
    name: app-network
    driver: bridge

volumes:
  minio_data:
